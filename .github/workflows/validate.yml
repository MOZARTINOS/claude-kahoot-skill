name: Validate skill

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate skill
        run: python scripts/validate_skill.py
      - name: Build upload archive
        run: python scripts/package_skill.py
      - name: Inspect archive
        run: python -m zipfile --list dist/kahoot-quiz-creator.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kahoot-quiz-creator
          path: dist/kahoot-quiz-creator.zip
          if-no-files-found: error
