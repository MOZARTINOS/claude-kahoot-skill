name: Validate skill

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Validate skill
        run: python scripts/validate_skill.py
      - name: Build upload archive
        run: python scripts/package_skill.py
      - name: Inspect archive
        run: python -m zipfile --list dist/kahoot-quiz-creator.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kahoot-quiz-creator
          path: dist/kahoot-quiz-creator.zip
          if-no-files-found: error
