name: Validate skill

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate skill
        run: python scripts/validate_skill.py
      - name: Build upload archive
        run: python scripts/package_skill.py
      - name: Inspect archive
        run: python -m zipfile --list dist/kahoot-quiz-creator.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kahoot-quiz-creator
          path: dist/kahoot-quiz-creator.zip
          if-no-files-found: error
