name: Validate skill

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Validate skill
        run: python scripts/validate_skill.py
      - name: Build upload archive
        run: python scripts/package_skill.py
      - name: Inspect archive
        run: python -m zipfile --list dist/kahoot-quiz-creator.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kahoot-quiz-creator
          path: dist/kahoot-quiz-creator.zip
          if-no-files-found: error
