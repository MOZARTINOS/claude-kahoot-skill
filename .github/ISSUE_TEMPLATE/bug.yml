name: Bug report
description: Report incorrect skill behavior or broken automation guidance
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, cookies, private quiz content, or student data.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the prompt and sanitized steps needed to reproduce the issue.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Claude surface, browser automation environment, locale, and date tested.
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
